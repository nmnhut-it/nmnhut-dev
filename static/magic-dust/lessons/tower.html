<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tháp Luyện Tập — Magic Dust</title>
<!-- THÁP VÔ ĐỊNH (tower-climb mode) — tower.js, a fork of island.js, not
     node.js: a run here never touches the main 'magicdust.saga' counter.
     See TOWER-CLIMB-PLAN.md. Reached via its own map pin (saga.js), always
     optional/additive — never gates the main story path. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<link rel="stylesheet" href="node.css">
<style>
/* tower-only HUD + results screen — kept inline (not node.css, which has
   pre-existing unrelated edits in flight) so this page stays self-contained. */
#towerhud{position:fixed;top:8px;right:12px;z-index:50;display:flex;align-items:center;gap:14px;max-width:calc(100vw - 24px);
  font:700 13px/1.2 ui-monospace,monospace;color:#183f49;background:rgba(255,250,240,.94);
  border:1px solid #78b2a5;border-radius:10px;padding:7px 14px;backdrop-filter:blur(6px)}
#towerhud b{color:#533b00;margin-left:4px}
#towerhud .thlives b{color:#9b3845}
#towerhud .pystat{display:block;margin-left:0;padding:4px 10px;white-space:nowrap;background:#fffaf0}
@media(max-width:700px){
  #towerhud{top:68px;left:8px;right:8px;max-width:none;justify-content:center;flex-wrap:wrap;gap:6px 10px;padding:6px 8px;font-size:11px}
  #towerhud .pystat{order:-1;flex:1 0 100%;padding:4px 8px;text-align:center;font-size:10.5px}
  body #book{padding-top:136px}
}
#towerresults{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:rgba(227,243,220,.9);backdrop-filter:blur(4px)}
.trcard{text-align:center;padding:32px 26px;border-radius:18px;max-width:420px;margin:0 16px;
  background:#fffaf0;border:1px solid #78b2a5;box-shadow:0 18px 60px rgba(45,100,37,.18)}
.trtitle{font-size:22px;font-weight:900;color:#183f49;text-shadow:0 2px 0 #fffdf5;margin-bottom:10px}
.trsub{color:#4f6f73;font-size:14px;margin-bottom:18px}
.trstats{display:flex;justify-content:center;gap:22px;font:700 14px/1.4 ui-monospace,monospace;color:#533b00;margin-bottom:22px}
.trstats b{color:#183f49}
.tractions{display:flex;gap:12px;justify-content:center}
.tractions button{padding:11px 20px;border-radius:10px;border:1px solid #78b2a5;background:#edf7ef;
  color:#183f49;font:700 13.5px/1 ui-monospace,monospace;cursor:pointer}
.tractions button:hover{background:#d9eee5}
</style>
<script defer src="theme.js"></script>
<script defer src="cell-validation.js"></script>
<script defer src="progress-versioning.js"></script>
<script defer src="tower-state.js"></script>
<script type="module">
const towerFiles = {
  tower: './content/tower.js',
  inferno: './content/towerINFERNO.js',
  standardio: './content/towerSTANDARDIO.js',
  operators: './content/towerOPERATORS.js',
  loopcontrol: './content/towerLOOPCONTROL.js',
  collections: './content/towerCOLLECTIONS.js',
  dictionaries: './content/towerDICTIONARIES.js',
  errors: './content/towerERRORS.js',
};
const requested = new URLSearchParams(location.search).get('course') || 'tower';
const selected = Object.hasOwn(towerFiles, requested) ? requested : 'tower';
const { default: tower } = await import(towerFiles[selected]);
window.NODE = tower;
document.title = `${tower.title} — Magic Dust`;
await import('./tower.js');
</script>
</head>
<body></body>
</html>
