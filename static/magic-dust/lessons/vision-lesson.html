<body><script type="module">
import { VISION_NODES, visionCompletionKey } from "./content/vision-curriculum.js?v=20260714-101425";
import { previousReadyVisionNode } from "./vision-state.js?v=20260714-101425";

const id = Number.parseInt(new URLSearchParams(location.search).get("node"), 10);
const meta = VISION_NODES.find(node => node.id === id);
const mainProgress = Math.max(0, Number.parseInt(localStorage.getItem("magicdust.saga"), 10) || 0);
const previous = previousReadyVisionNode(id);
const previousDone = !previous || localStorage.getItem(visionCompletionKey(previous.id)) === "1";

if (!meta?.ready || mainProgress < meta.mainRequired || !previousDone) {
  location.replace("./vision.html");
} else {
  const path = `./content/visionnode${String(id).padStart(2, "0")}.js?v=20260714-101425`;
  const { default: lesson } = await import(path);
  window.NODE = lesson;
  await import("./island.js?v=20260714-101425");
}
</script></body>
